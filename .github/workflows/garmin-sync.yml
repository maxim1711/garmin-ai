name: Garmin Sync

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every morning — adjust to your timezone
  workflow_dispatch:        # allows manual "Run workflow" from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install garminconnect

      - name: Run sync
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python sync_garmin.py --days 3 --sink files --out ./garmin

      - name: Commit and push updated garmin/ folder
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin/
          git diff --cached --quiet || git commit -m "chore: garmin sync $(date -u +%Y-%m-%d)"
          git push
